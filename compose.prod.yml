# Production stack for the App EC2. Images come from ECR; their full URIs (which embed
# the AWS account ID) are supplied via env vars in the server-side .env, never committed.
#
# Server .env must define:
#   BACKEND_IMAGE=<acct>.dkr.ecr.us-west-2.amazonaws.com/ragdocs-backend:latest
#   FRONTEND_IMAGE=<acct>.dkr.ecr.us-west-2.amazonaws.com/ragdocs-frontend:latest
#   OPENAI_API_KEY=<key>
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    # Internal only — the frontend nginx reverse-proxies to it by service name.
    expose:
      - "8000"
    env_file: .env
    environment:
      MONGODB_URI: mongodb://mongo:27017
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - mongo
      - qdrant

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  qdrant_data:
