services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST + gRPC
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # Uncomment from Phase 4 onward, once backend/Dockerfile exists.
  # backend:
  #   build: ./backend
  #   restart: unless-stopped
  #   ports:
  #     - "8000:8000"
  #   env_file: .env
  #   environment:
  #     MONGODB_URI: mongodb://mongo:27017
  #     QDRANT_URL: http://qdrant:6333
  #   depends_on:
  #     - mongo
  #     - qdrant

volumes:
  mongo_data:
  qdrant_data:
