services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST + gRPC
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override host-based URLs with in-network service names.
      MONGODB_URI: mongodb://mongo:27017
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - mongo
      - qdrant

  # frontend service is added in Phase 3, once the React app exists.

volumes:
  mongo_data:
  qdrant_data:
